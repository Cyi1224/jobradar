name: CI / Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── 后端：Maven 编译 + 测试 ───
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Run Tests
        run: mvn -B test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

  # ─── 前端：Node.js 校验 ───
  frontend:
    name: Frontend (Static)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate static files exist
        run: |
          test -f jobradar/index.html && echo "✓ index.html"
          test -f jobradar/js/main.js   && echo "✓ main.js"
          test -f jobradar/style.css    && echo "✓ style.css"
          test -f server.js             && echo "✓ server.js"
          echo "All static assets present"

  # ─── Docker 镜像构建验证 ───
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max