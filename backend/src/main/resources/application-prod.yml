# ── 生产 profile：MySQL 8（持久化）──
# 启用方式：java -jar app.jar --spring.profiles.active=prod
#          或环境变量 SPRING_PROFILES_ACTIVE=prod
# 连接信息全部走环境变量，密钥不落代码：
#   DB_HOST(默认 localhost) DB_PORT(3306) DB_NAME(jobradar) DB_USER(root) DB_PASSWORD
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:jobradar}?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update           # 生产：按实体建/补表，不删数据（首次自动建表）
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
      hibernate.jdbc.batch_size: 200
      hibernate.order_inserts: true
  h2:
    console:
      enabled: false             # 生产关闭 H2 控制台

# 生产不灌演示假数据；校招信息库（jobs）仍会在库为空时自动灌入
jobradar:
  seed-demo: false
  # 收窄跨域来源为你的前端域名（多个用逗号分隔）。用环境变量 CORS_ORIGINS 覆盖。
  cors:
    allowed-origins: ${CORS_ORIGINS:https://你的前端域名}
  # JWT 签名密钥：生产必须用环境变量 JWT_SECRET 设一个 ≥32 字节的强随机串。
  jwt:
    secret: ${JWT_SECRET:please-set-JWT_SECRET-to-a-strong-32byte-random-string}
    ttl-days: 7
  # 支付演示开关：生产必须 false —— 关闭「点击即开通会员」的免费后门，
  # 会员只能由真实支付回调（微信/支付宝/Stripe 验签成功）授予。
  payment:
    demo-mode: false
